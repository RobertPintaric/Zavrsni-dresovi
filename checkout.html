<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <title>Plaćanje - GOAT dresovi</title>
  <link rel="stylesheet" href="zavrsni.css">
  <link rel="stylesheet" href="checkout.css">
  <script src="checkout.js" defer></script>
  <script src="login.js" defer></script>
</head>
<body>
<header>
  <div class="brand">
    <div class="logo">G</div>
    <h1>GOAT dresovi</h1>
  </div>

  <nav id="nav-menu">
    <a href="index.html">Početna stranica</a>
    <a href="svi-proizvodi.html">Svi proizvodi</a>
    <a href="kosarica.html">Košarica</a>
  </nav>

  <div class="header-icons">
    <a href="kosarica.html" class="icon">🛒</a>
    <a href="login.html" id="login-link" class="icon">👤</a>
  </div>
</header>

<section class="checkout-page">
  <h2>Checkout</h2>
  <p></p>

  <div id="checkoutSummary" class="checkout-summary"></div>

  <form id="checkoutForm" class="checkout-form">
    <label for="fullName">Ime i prezime:</label>
    <input type="text" id="fullName" placeholder="Unesite ime i prezime">

    <label for="address">Adresa:</label>
    <input type="text" id="address" placeholder="Unesite adresu">

    <label for="city">Grad:</label>
    <input type="text" id="city" placeholder="Unesite grad">

    <label for="card">Broj kartice:</label>
    <input type="text" id="card" placeholder="1234 5678 9012 3456">

    <button type="submit">Potvrdi narudžbu</button>
  </form>

  <div id="successMessage" class="success-message" style="display:none;">
    <h3>Narudžba uspješno zaprimljena!</h3>
    <p>Hvala na kupnji u GOAT dresovima.</p>
  </div>
</section>

<footer>
  <p>&copy; GOAT dresovi</p>
</footer>
</body>
</html>
